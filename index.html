<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>我的周期管理</title>
<script>
// 根据当前日期自动跳转到对应月份页面
// 5月周期：5/5-6/3，6月周期：6/4-7/3
var today = new Date();
var may_start = new Date(2026, 4, 5);
var jun_start = new Date(2026, 5, 4);
var jul_start = new Date(2026, 6, 4);

if (today >= jun_start && today < jul_start) {
  window.location.replace('june.html');
} else {
  window.location.replace('may.html');
}
</script>
</head>
